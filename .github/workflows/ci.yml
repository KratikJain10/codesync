name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Server Checks ──
  server:
    name: Server — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - run: npm ci
      - run: npx prisma generate --schema=src/prisma/schema.prisma
      - run: npx tsc --noEmit

  # ── Client Checks ──
  client:
    name: Client — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: npm run build

  # ── Docker Build ──
  docker:
    name: Docker — Verify Build
    runs-on: ubuntu-latest
    needs: [server, client]

    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t codesync-server ./server

      - name: Build client image
        run: docker build -t codesync-client ./client
